<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌾 水稻病害智能检测系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .upload-transition { transition: all 0.3s ease; }
        .result-item { cursor: pointer; transition: all 0.2s; }
        .result-item:hover { transform: translateX(4px); }
        .result-item.active { border-left-width: 6px !important; background-color: #f0fdf4; }
        .advice-box { white-space: pre-line; line-height: 1.6; }
        .chat-message { padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; max-width: 85%; }
        .user-message { background-color: #e3f2fd; margin-left: auto; }
        .assistant-message { background-color: #f1f8e9; margin-right: auto; }
        .typing-indicator span { display: inline-block; width: 6px; height: 6px; background: #888; border-radius: 50%; margin: 0 2px; animation: typing 1.4s infinite; }
        @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    </style>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 min-h-screen flex flex-col items-center p-4">
    <div class="max-w-7xl w-full">
        <!-- 标题 -->
        <div class="text-center mb-6">
            <div class="inline-block p-3 bg-white rounded-full shadow-lg mb-3">
                <i class="fas fa-seedling text-4xl text-green-600"></i>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold text-green-800">水稻病害智能检测系统</h1>
            <p class="text-gray-600 mt-2">后端自动绘图 · 千问 AI 专家问答</p>
        </div>

        <!-- 控制栏 -->
        <div class="bg-white/80 backdrop-blur-sm rounded-xl shadow-md p-4 mb-6 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center space-x-4">
                <span class="font-medium text-gray-700"><i class="fas fa-microchip mr-2"></i>模型:</span>
                <select id="modelSelect" class="border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500 outline-none"></select>
                <button id="switchModelBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                    <i class="fas fa-sync-alt mr-2"></i>切换
                </button>
            </div>
            <div class="flex items-center space-x-6 text-sm text-gray-600">
                <div><i class="far fa-clock mr-1"></i>耗时：<span id="predictTimeDisplay">--</span></div>
                <div><i class="fas fa-cube mr-1"></i>当前：<span id="currentModelDisplay">未加载</span></div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 左侧：结果与建议（高度由内容撑开） -->
            <div class="lg:col-span-3 flex flex-col space-y-4">
                <!-- 上传 -->
                <div class="bg-white/80 backdrop-blur-sm rounded-xl shadow-md p-4">
                    <div id="uploadArea" class="border-2 border-dashed border-green-300 rounded-xl p-6 text-center cursor-pointer hover:border-green-500 hover:bg-green-50 upload-transition">
                        <i class="fas fa-cloud-upload-alt text-4xl text-green-400 mb-2"></i>
                        <p class="font-medium text-gray-600">点击或拖拽上传图片</p>
                        <p class="text-xs text-gray-400 mt-1">支持 JPG, PNG (Max 16MB)</p>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                </div>

                <!-- 结果列表 -->
                <div id="resultPanel" class="bg-white/90 backdrop-blur-sm rounded-xl shadow-md p-4 hidden flex-1">
                    <h3 class="font-semibold text-gray-700 mb-3 flex items-center">
                        <i class="fas fa-search text-green-600 mr-2"></i> 检测结果
                        <span id="resultCount" class="ml-auto text-xs bg-green-100 text-green-800 px-2 py-1 rounded-full"></span>
                    </h3>
                    <div id="resultList" class="space-y-2 max-h-60 overflow-y-auto pr-1"></div>
                    <div id="noResultMsg" class="text-center text-gray-400 py-8 hidden">
                        <i class="fas fa-check-circle text-3xl mb-2"></i>
                        <p>未检测到病害</p>
                    </div>
                </div>

                <!-- 防治建议 -->
                <div id="advicePanel" class="bg-white/90 backdrop-blur-sm rounded-xl shadow-md p-4 hidden">
                    <h3 class="font-semibold text-gray-700 mb-2 flex items-center">
                        <i class="fas fa-clipboard-list text-blue-600 mr-2"></i> 防治建议
                    </h3>
                    <div id="adviceContent" class="text-sm text-gray-600 advice-box bg-blue-50 p-3 rounded-lg">
                        点击左侧病害项查看详情
                    </div>
                </div>
            </div>

            <!-- 中间：图片预览（高度设置为与右侧相同） -->
            <div class="lg:col-span-5">
                <div class="bg-white/90 backdrop-blur-sm rounded-xl shadow-md p-5 flex flex-col h-[600px] lg:h-[calc(100vh-140px)]">
                    <h3 class="font-semibold text-gray-700 mb-3 flex items-center flex-shrink-0">
                        <i class="fas fa-image text-blue-600 mr-2"></i> 检测标注图
                    </h3>
                    <!-- 预览区域（有图片时显示） -->
                    <div id="previewArea" class="hidden flex-1 flex flex-col min-h-0">
                        <div class="flex-1 flex items-center justify-center bg-white rounded-lg overflow-hidden">
                            <img id="previewImg" src="" alt="检测结果" class="max-w-full max-h-full object-contain">
                        </div>
                        <div class="flex justify-between items-center text-sm text-gray-600 mt-3 px-1 flex-shrink-0">
                            <span><i class="far fa-image mr-1"></i> <span id="imageSize"></span></span>
                            <span><i class="far fa-clock mr-1"></i> 耗时：<span id="detectTime"></span></span>
                        </div>
                    </div>
                    <!-- 占位符（无图片时显示） -->
                    <div id="previewPlaceholder" class="flex-1 flex items-center justify-center text-center text-gray-400">
                        <div>
                            <i class="fas fa-image text-5xl mb-3 opacity-50"></i>
                            <p>上传图片后，此处将显示标注结果</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：AI 问答（保持原有高度） -->
            <div class="lg:col-span-4">
                <div class="bg-white/90 backdrop-blur-sm rounded-xl shadow-md p-5 flex flex-col h-[600px] lg:h-[calc(100vh-140px)] sticky top-4">
                    <h3 class="font-semibold text-gray-700 mb-3 flex items-center">
                        <i class="fas fa-robot text-blue-600 mr-2"></i> 千问农业专家
                    </h3>
                    <div id="chatMessages" class="flex-1 overflow-y-auto mb-4 p-2 bg-gray-50 rounded-lg space-y-2">
                        <div class="assistant-message chat-message text-sm">
                            你好！我是农业助手。上传图片并点击病害项后，我可以为你提供针对性的防治建议。
                        </div>
                    </div>
                    <div class="flex space-x-2">
                        <input type="text" id="questionInput" placeholder="输入问题..." class="flex-1 border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <button id="askBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 disabled:opacity-50">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl shadow-2xl text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-green-500 border-t-transparent mx-auto mb-4"></div>
            <p class="text-gray-700 font-medium">AI 正在分析并绘制...</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
